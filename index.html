<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auranvite | Invite with an Aura</title>

    <link rel="icon" type="image/png" href="assets/logo.png">

    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --text-gray: #b0b0b0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .aura-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .aura-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,255,255,0.15) 0%, rgba(188,19,254,0.1) 50%, transparent 70%);
            filter: blur(100px);
            border-radius: 50%;
            animation: moveAura 15s infinite alternate ease-in-out;
        }

        @keyframes moveAura {
            0% { transform: translate(-30%, -30%) scale(1); }
            100% { transform: translate(10%, 20%) scale(1.2); }
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. تقليل المسافة تحت اللوجو */
        .logo-icon {
            width: 320px;
            height: auto;
            max-width: 60vw;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.5));
            margin-bottom: -10px; /* مسافة سلبية بسيطة لتقريب الاسم من اللوجو */
            animation: floatLogo 4s infinite ease-in-out, fadeIn 1.5s ease-out;
        }

        /* 2. تقليل المسافة تحت اسم الموقع */
        .logo-text {
            width: 750px;
            height: auto;
            max-width: 85vw;
            filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.3));
            margin-bottom: 5px; /* مسافة صغيرة جداً قبل السلوجان */
            animation: fadeInText 2s ease-out;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeInText {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        /* 3. تنسيق السلوجان وتقليل المسافة فوقه */
        .slogan {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-top: 0; 
            letter-spacing: 4px;
            font-weight: 300;
            text-transform: uppercase;
            opacity: 0.7;
            animation: fadeInText 2.5s ease-out;
        }

        /* 4. تقليل المسافة فوق زرار الحالة */
        .status-msg {
            margin-top: 40px; 
            font-size: 0.9rem;
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 8px 20px;
            display: inline-block;
            border-radius: 50px;
            background: rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            animation: fadeInText 3s ease-out;
        }
    </style>
</head>
<body>

    <div class="aura-wrapper">
        <div class="aura-blob"></div>
    </div>

    <div class="container">
        <img src="assets/logo.png" alt="Auranvite Icon" class="logo-icon">
        <img src="assets/auranvite-text.png" alt="AURANVITE" class="logo-text">
        <div class="slogan">Invite with an Aura</div>
        <div class="status-msg">
            نحن نجهز الآن تجربة استثنائية لدعواتكم الرقمية.. قريباً
        </div>
    </div>

</body>
</html>
